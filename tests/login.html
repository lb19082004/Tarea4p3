<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — To-Do CRUD</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .login-error {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.4);
      color: #f87171;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .toggle-password {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #7b829e;
      cursor: pointer;
      font-size: 1rem;
    }
    .input-wrap { position: relative; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <h1 class="login-title">To<span>Do</span>List</h1>
      <p class="login-sub">Inicia sesión para gestionar tus tareas</p>

      <div class="login-error" id="login-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Usuario</label>
          <input
            class="form-control"
            type="text"
            id="username"
            name="username"
            placeholder="admin"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-wrap">
            <input
              class="form-control"
              type="password"
              id="password"
              name="password"
              placeholder="••••••"
              autocomplete="current-password"
              required
              style="padding-right:2.5rem"
            />
            <button type="button" class="toggle-password" id="toggle-pw" title="Mostrar/ocultar contraseña">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="btn-login" style="width:100%;justify-content:center;padding:.75rem">
          Iniciar sesión
        </button>
      </form>

      <div class="login-hint">
        Demo — usuario: <strong>admin</strong> | contraseña: <strong>1234</strong>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/login.js"></script>
  <script>
    Auth.initLoginForm();

    
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });
  </script>
</body>
</html>
